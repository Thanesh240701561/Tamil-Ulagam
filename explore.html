<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Destinations - Tamil ulagam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .explore-header {
            background: linear-gradient(180deg, var(--pastel-blue) 0%, var(--white) 100%);
            padding: 40px 20px 20px;
            text-align: center;
            position: relative;
        }

        .back-link {
            position: absolute;
            left: 20px;
            top: 45px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }

        .destinations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }

        @media (min-width: 900px) {
            .destinations-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- 1️⃣ Header Section -->
        <header class="main-header">
            <div class="header-left">
                <a href="home.html" class="logo-link"
                    style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit;">
                    <div class="logo-container">
                        <img src="./src/assets/logo.png" alt="Tamil Ulagam Logo" class="main-logo"
                            onerror="this.src='https://via.placeholder.com/40?text=Logo'">
                    </div>
                    <h1 class="brand-name">Tamil Ulagam</h1>
                </a>
            </div>
            <div class="header-right" style="display: flex; align-items: center; gap: 12px;">
                <a href="#" class="map-link-btn" aria-label="Open Map">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z" />
                        <path d="M15 5.764v15" />
                        <path d="M9 3.236v15" />
                    </svg>
                </a>
                <button id="profileBtn" class="profile-btn" aria-label="User Profile">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- 2️⃣ Search Section -->
        <section class="search-section">
            <div class="search-bar-container">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                </svg>
                <input type="text" placeholder="Search destinations..." class="search-input" id="exploreSearch">
            </div>
        </section>

        <!-- 2.5️⃣ Categories Filter Section (Dynamic) -->
        <section class="content-section" style="margin-bottom: 20px;">
            <div id="categoryFilterContainer" class="scroll-container horizontal-scroll no-scrollbar"
                style="padding: 5px 0 15px;">
                <!-- Category chips will be injected here -->
            </div>
        </section>

        <main class="content-section">
            <h2 id="pageSubTitle" style="margin-bottom: 20px; font-size: 24px;">All Destinations</h2>
            <div class="destinations-grid" id="destGrid">
                <!-- Dynamic Content Loads Here -->
            </div>
        </main>

        <footer class="bottom-spacer"></footer>
    </div>
    <script src="destinationsData.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const cityFilter = urlParams.get('city');
            const catFilter = urlParams.get('cat');
            const qFilter = urlParams.get('q');
            const destGrid = document.getElementById('destGrid');
            const pageSubTitle = document.getElementById('pageSubTitle');
            const searchInput = document.getElementById('exploreSearch');
            const categoryFilterContainer = document.getElementById('categoryFilterContainer');

            let currentCity = cityFilter ? cityFilter.toLowerCase() : null;
            let currentCat = catFilter ? catFilter.toLowerCase() : 'all';
            let currentSearch = qFilter ? qFilter.toLowerCase() : '';

            if (qFilter) {
                searchInput.value = qFilter;
            }

            function setupCategories() {
                // Get unique categories for the current filtered pool (if city is selected, show only city cats)
                let pool = destinationsData;
                if (currentCity) {
                    pool = destinationsData.filter(d => d.city.toLowerCase() === currentCity);
                }

                const categories = ['all', ...new Set(pool.map(d => d.category.toLowerCase()))];

                categoryFilterContainer.innerHTML = '';
                categories.forEach(cat => {
                    const chip = document.createElement('div');
                    chip.className = `cat-card ${cat} ${currentCat === cat ? 'active' : ''}`;
                    chip.style.cursor = 'pointer';
                    chip.style.padding = '8px 20px';
                    chip.style.fontSize = '14px';
                    if (currentCat === cat) {
                        chip.style.border = '2px solid var(--text-main)';
                    }
                    chip.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                    chip.onclick = () => {
                        currentCat = cat;
                        renderDestinations();
                        setupCategories(); // Refresh active state
                    };
                    categoryFilterContainer.appendChild(chip);
                });
            }

            function renderDestinations() {
                destGrid.innerHTML = '';

                let filtered = destinationsData;

                // 1. City Filter
                if (currentCity) {
                    filtered = filtered.filter(d => d.city.toLowerCase() === currentCity);
                    pageSubTitle.textContent = `Famous Places in ${currentCity.charAt(0).toUpperCase() + currentCity.slice(1)}`;
                } else {
                    pageSubTitle.textContent = `Explore All Destinations`;
                }

                // 2. Category Filter
                if (currentCat !== 'all') {
                    filtered = filtered.filter(d => d.category.toLowerCase() === currentCat);
                    if (!currentCity) {
                        pageSubTitle.textContent = `${currentCat.charAt(0).toUpperCase() + currentCat.slice(1)} Destinations`;
                    }
                }

                // 3. Search Term
                if (currentSearch) {
                    const term = currentSearch.toLowerCase();
                    filtered = filtered.filter(d =>
                        d.name.toLowerCase().includes(term) ||
                        d.city.toLowerCase().includes(term) ||
                        d.category.toLowerCase().includes(term) ||
                        d.description.toLowerCase().includes(term)
                    );
                    pageSubTitle.textContent = `Search results for "${currentSearch}"`;
                }

                if (filtered.length === 0) {
                    destGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-light);">No destinations found matching your criteria.</p>';
                    return;
                }

                filtered.forEach(dest => {
                    const card = document.createElement('a');
                    card.href = 'details.html?id=' + dest.id;
                    card.className = 'dest-card';
                    card.innerHTML = `
                        <div class="dest-img-box" style="background-image: url('${dest.image}')"></div>
                        <div class="dest-info">
                            <h3>${dest.name}</h3>
                            <p>${dest.description}</p>
                            <div class="rating">⭐⭐⭐⭐⭐ ${dest.rating}</div>
                        </div>
                    `;
                    destGrid.appendChild(card);
                });
            }

            // Initial Setup
            renderDestinations();
            setupCategories();

            // Search Handler
            searchInput.addEventListener('input', (e) => {
                currentSearch = e.target.value;
                renderDestinations();
            });
        });
    </script>
    <script src="destinationsData.js"></script>
    <script src="script.js"></script>
</body>

</html>
