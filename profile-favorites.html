<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorites - Tamil Ulagam </title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .profile-page-header {
            background: linear-gradient(180deg, #fce4ec 0%, rgba(255, 255, 255, 0) 100%);
            padding: 40px 20px 20px;
            text-align: center;
            position: relative;
            margin-bottom: 20px;
        }

        .back-link {
            position: absolute;
            left: 0px;
            top: 45px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }

        .profile-container {
            max-width: 800px;
            margin: 0 auto 40px;
        }

        .favorite-card {
            display: flex;
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .favorite-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .favorite-img {
            width: 140px;
            background-size: cover;
            background-position: center;
        }

        .favorite-details {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .favorite-details h3 {
            font-size: 18px;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .favorite-details p {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .favorite-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            align-items: center;
        }

        .btn-view {
            padding: 8px 16px;
            background: var(--pastel-blue);
            color: #1e88e5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 20px;
            transition: background 0.2s;
        }

        .btn-view:hover {
            background: #b2ebf2;
        }

        .btn-remove {
            color: #ef5350;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            transition: transform 0.2s;
        }

        .btn-remove:hover {
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .favorite-card {
                flex-direction: column;
            }

            .favorite-img {
                width: 100%;
                height: 160px;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="profile-page-header">
            <a href="home.html" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back
            </a>
            <h2 style="font-size: 24px; margin-top: 5px;">My Favorites</h2>
        </header>

        <main class="content-section">
            <div class="profile-container">
                <div class="favorite-card">
                    <div class="favorite-img"
                        style="background-image: url('https://images.unsplash.com/photo-1590523741831-ab7e8b8f9c7f?auto=format&fit=crop&w=400&q=80')">
                    </div>
                    <div class="favorite-details">
                        <h3>Kanyakumari Beach</h3>
                        <p>Beautiful seaside spot where three oceans meet.</p>
                        <div class="favorite-actions">
                            <button class="btn-remove" aria-label="Remove from favorites">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                    fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path
                                        d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                                    </path>
                                </svg>
                            </button>
                            <a href="details.html?id=kk1" class="btn-view">View Detail</a>
                        </div>
                    </div>
                </div>

                <div class="favorite-card">
                    <div class="favorite-img"
                        style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=400&q=80')">
                    </div>
                    <div class="favorite-details">
                        <h3>Kalikesam</h3>
                        <p>Serene forest area perfect for nature walks.</p>
                        <div class="favorite-actions">
                            <button class="btn-remove" aria-label="Remove from favorites">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                    fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path
                                        d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                                    </path>
                                </svg>
                            </button>
                            <a href="details.html?id=kk2" class="btn-view">View Detail</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        document.querySelectorAll('.btn-remove').forEach(btn => {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                const card = this.closest('.favorite-card');
                card.style.opacity = '0';
                card.style.transform = 'scale(0.9)';
                setTimeout(() => card.remove(), 300);
            });
        });
    </script>
</body>

</html>
