<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Information - Tamil Ulagam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .profile-page-header {
            background: linear-gradient(180deg, var(--pastel-blue) 0%, rgba(255, 255, 255, 0) 100%);
            padding: 40px 20px 20px;
            text-align: center;
            position: relative;
            margin-bottom: 20px;
        }

        .back-link {
            position: absolute;
            left: 0px;
            top: 45px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }

        .profile-container {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow-soft);
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-light);
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1px solid #eee;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1e88e5;
            box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.1);
            background: var(--white);
        }

        .save-btn {
            background: #1e88e5;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: var(--radius-md);
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        .save-btn:hover {
            background: #1565c0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(30, 136, 229, 0.3);
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: block;
            border: 4px solid var(--pastel-blue);
        }

        .change-photo-btn {
            display: block;
            text-align: center;
            color: #1e88e5;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 30px;
            background: none;
            border: none;
            width: 100%;
        }

        .change-photo-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="profile-page-header">
            <a href="home.html" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back
            </a>
            <h2 style="font-size: 24px; margin-top: 5px;">Personal Information</h2>
        </header>

        <main class="content-section">
            <div class="profile-container">
                <img src="https://ui-avatars.com/api/?name=User&background=1e88e5&color=fff&size=200" alt="User Avatar"
                    class="profile-avatar-large">
                <button class="change-photo-btn">Change Photo</button>

                <form
                    onsubmit="event.preventDefault(); alert('Profile updated successfully!'); window.location.href='home.html';">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" value="User Explorer" placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" value="user@tamilulagam.com" placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" value="+91 98765 43210" placeholder="Enter your phone number">
                    </div>

                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" value="Chennai, India" placeholder="Enter your location">
                    </div>

                    <button type="submit" class="save-btn">Save Changes</button>
                </form>
            </div>
        </main>
    </div>
</body>

</html>
