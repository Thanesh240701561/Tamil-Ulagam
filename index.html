<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tamil Ulagam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .login-page-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card-wrapper {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            animation: fadeIn 0.6s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo-container {
            text-align: center;
            margin-bottom: 24px;
        }

        .login-logo-container img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            background: #fff;
            border-radius: 16px;
            padding: 10px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 12px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            text-align: center;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-light);
            text-align: center;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px 15px 45px;
            border-radius: var(--radius-md);
            border: 1px solid #e0e0e0;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            background: #fafafa;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1e88e5;
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #1e88e5;
            color: var(--white);
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(30, 136, 229, 0.3);
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #1565c0;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(30, 136, 229, 0.4);
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .login-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            cursor: pointer;
        }

        .forgot-pass {
            color: #1e88e5;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-pass:hover {
            text-decoration: underline;
        }

        .divider-box {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #ccc;
            font-size: 14px;
        }

        .divider-box::before,
        .divider-box::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }

        .divider-box span {
            padding: 0 10px;
        }

        .social-login-btn {
            width: 100%;
            padding: 14px;
            background: var(--white);
            border: 1px solid #e0e0e0;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .social-login-btn:hover {
            background: #f5f5f5;
        }

        .signup-text {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-light);
        }

        .signup-text a {
            color: #1e88e5;
            font-weight: 600;
            text-decoration: none;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-page-container">
        <div class="login-card-wrapper">
            <div class="login-logo-container">
                <img src="./src/assets/logo.png" alt="Tamil Ulagam Logo"
                    onerror="this.src='https://via.placeholder.com/60?text=DK'">
                <h1 class="login-title">Tamil Ulagam</h1>
                <p class="login-subtitle">Sign in to start exploring</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <div class="login-options">
                    <label>
                        <input type="checkbox" checked> Remember me
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Log In</button>
            </form>

            <div class="divider-box">
                <span>OR</span>
            </div>

            <button class="social-login-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v20"></path>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                </svg>
                Sign in with Google
            </button>

            <p class="signup-text">
                Don't have an account? <a href="#">Create one</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            // In a real app, perform authentication here
            // Redirect to home page
            window.location.href = 'home.html';
        });
    </script>
</body>

</html>
