<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Categories - Discover Kumari</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }

        .cat-large-card {
            height: 200px;
            border-radius: var(--radius-lg);
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s ease;
        }

        .cat-large-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .cat-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.6));
            display: flex;
            align-items: flex-end;
            padding: 20px;
            color: white;
            font-size: 24px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- 1️⃣ Header Section -->
        <header class="main-header">
            <div class="header-left">
                <a href="home.html" class="logo-link"
                    style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit;">
                    <div class="logo-container">
                        <img src="./src/assets/logo.png" alt="Tamil Ulagam Logo" class="main-logo"
                            onerror="this.src='https://via.placeholder.com/40?text=Logo'">
                    </div>
                    <h1 class="brand-name">Discover Kumari</h1>
                </a>
            </div>
            <div class="header-right" style="display: flex; align-items: center; gap: 12px;">
                <a href="#" class="map-link-btn" aria-label="Open Map">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z" />
                        <path d="M15 5.764v15" />
                        <path d="M9 3.236v15" />
                    </svg>
                </a>
                <button id="profileBtn" class="profile-btn" aria-label="User Profile">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- 2️⃣ Search Section -->
        <section class="search-section">
            <div class="search-bar-container">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                </svg>
                <input type="text" placeholder="Search categories..." class="search-input">
            </div>
        </section>

        <main class="content-section">
            <div class="categories-grid">
                <a href="explore.html?cat=waterfalls" class="cat-large-card"
                    style="background-image: url('https://images.unsplash.com/photo-1433086390636-524ee3c004d6?auto=format&fit=crop&w=500&q=80')">
                    <div class="cat-overlay">Waterfalls</div>
                </a>
                <a href="explore.html?cat=mountains" class="cat-large-card"
                    style="background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=500&q=80')">
                    <div class="cat-overlay">Mountains</div>
                </a>
                <a href="explore.html?cat=islands" class="cat-large-card"
                    style="background-image: url('https://images.unsplash.com/photo-1559128010-7c1ad6e1b6a5?auto=format&fit=crop&w=500&q=80')">
                    <div class="cat-overlay">Islands</div>
                </a>
                <a href="explore.html?cat=beaches" class="cat-large-card"
                    style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=500&q=80')">
                    <div class="cat-overlay">Beaches</div>
                </a>
                <a href="explore.html?cat=temples" class="cat-large-card"
                    style="background-image: url('https://images.unsplash.com/photo-1512100356132-d4263b6589a2?auto=format&fit=crop&w=500&q=80')">
                    <div class="cat-overlay">Temples</div>
                </a>
                <a href="explore.html?cat=forests" class="cat-large-card"
                    style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=500&q=80')">
                    <div class="cat-overlay">Forests</div>
                </a>
            </div>
        </main>
    </div>
    <script src="destinationsData.js"></script>
    <script src="script.js"></script>
</body>

</html>
